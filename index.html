<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XGPROF — Live Football Intelligence</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c0f; --surface: #111418; --surface2: #181c22; --border: #1e242d;
    --accent: #00e5a0; --accent2: #ff4d6d; --accent3: #f5c518;
    --text: #e8edf3; --muted: #5a6478; --live: #ff4d6d;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; overflow-x: hidden; }
  header { display:flex; align-items:center; justify-content:space-between; padding:18px 32px; border-bottom:1px solid var(--border); position:sticky; top:0; background:rgba(10,12,15,0.92); backdrop-filter:blur(12px); z-index:100; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:3px; }
  .logo span { color:var(--accent); }
  nav { display:flex; gap:8px; }
  nav button { background:none; border:1px solid transparent; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; padding:7px 14px; border-radius:4px; cursor:pointer; transition:all 0.2s; }
  nav button:hover, nav button.active { color:var(--accent); border-color:var(--accent); background:rgba(0,229,160,0.06); }
  .status-badge { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); border:1px solid var(--border); padding:5px 10px; border-radius:20px; }
  .layout { display:grid; grid-template-columns:300px 1fr 280px; height:calc(100vh - 61px); overflow:hidden; }
  .col { overflow-y:auto; border-right:1px solid var(--border); scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .col:last-child { border-right:none; }
  .col-header { padding:14px 20px; border-bottom:1px solid var(--border); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; position:sticky; top:0; background:var(--bg); z-index:10; display:flex; align-items:center; justify-content:space-between; }
  .live-dot { width:6px; height:6px; background:var(--live); border-radius:50%; display:inline-block; margin-right:6px; animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

  /* Match cards */
  .match-card { padding:16px 20px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; position:relative; animation:fadeIn 0.3s ease both; }
  .match-card:hover { background:var(--surface); }
  .match-card.selected { background:var(--surface); }
  .match-card.selected::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--accent); }
  .match-league { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .league-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .match-teams { display:flex; flex-direction:column; gap:6px; }
  .team-row { display:flex; align-items:center; justify-content:space-between; }
  .team-name { font-size:13px; font-weight:500; display:flex; align-items:center; gap:6px; }
  .team-crest { width:18px; height:18px; object-fit:contain; border-radius:2px; }
  .score-wrap { display:flex; align-items:center; gap:6px; }
  .score { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--text); min-width:24px; text-align:center; }
  .score.leading { color:var(--accent); }
  .xg-side { font-family:'DM Mono',monospace; font-size:9px; min-width:28px; text-align:right; display:none; }
  .xg-side.higher { color:var(--accent); font-weight:600; }
  .xg-side.lower { color:var(--accent2); }
  .match-meta { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
  .match-time { font-family:'DM Mono',monospace; font-size:10px; color:var(--live); letter-spacing:1px; }
  .match-time.upcoming { color:var(--muted); }
  .match-time.finished { color:var(--muted); }

  /* Date nav */
  .date-nav { display:flex; align-items:center; gap:6px; }
  .date-nav button { background:none; border:1px solid var(--border); color:var(--muted); width:24px; height:24px; border-radius:4px; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .date-nav button:hover { border-color:var(--accent); color:var(--accent); }
  .date-label { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; }

  /* Center panel */
  .center-panel { padding:28px; }
  .match-hero { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:32px; margin-bottom:24px; position:relative; overflow:hidden; }
  .match-hero::before { content:''; position:absolute; top:-60px; left:50%; transform:translateX(-50%); width:300px; height:120px; background:radial-gradient(ellipse,rgba(0,229,160,0.08) 0%,transparent 70%); pointer-events:none; }
  .hero-league { text-align:center; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:24px; }
  .hero-teams { display:flex; align-items:center; justify-content:space-between; gap:20px; }
  .hero-team { flex:1; text-align:center; }
  .hero-crest { width:64px; height:64px; margin:0 auto 12px; background:var(--surface2); border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid var(--border); overflow:hidden; }
  .hero-crest img { width:100%; height:100%; object-fit:contain; padding:6px; }
  .hero-name { font-size:16px; font-weight:500; margin-bottom:4px; }
  .hero-score-block { text-align:center; min-width:120px; }
  .hero-score { font-family:'Bebas Neue',sans-serif; font-size:72px; letter-spacing:6px; line-height:1; background:linear-gradient(180deg,var(--text) 0%,var(--muted) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .hero-status { font-family:'DM Mono',monospace; font-size:11px; color:var(--live); letter-spacing:2px; margin-top:6px; display:flex; align-items:center; justify-content:center; gap:6px; }
  .xg-hero { display:flex; gap:8px; justify-content:center; margin-top:10px; }
  .xg-badge { font-family:'DM Mono',monospace; font-size:11px; padding:3px 10px; border-radius:4px; }
  .xg-badge.home { color:var(--accent); background:rgba(0,229,160,0.08); border:1px solid rgba(0,229,160,0.2); }
  .xg-badge.away { color:var(--accent2); background:rgba(255,77,109,0.08); border:1px solid rgba(255,77,109,0.2); }

  .section-title { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2.5px; color:var(--muted); text-transform:uppercase; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .stats-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:24px; }
  .xg-bar-wrap { margin-bottom:16px; }
  .xg-bar-label { display:flex; justify-content:space-between; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-bottom:6px; }
  .xg-bar-track { height:6px; background:var(--surface2); border-radius:3px; display:flex; overflow:hidden; }
  .xg-bar-home { height:100%; background:var(--accent); border-radius:3px 0 0 3px; transition:width 1s; }
  .xg-bar-away { height:100%; background:var(--accent2); border-radius:0 3px 3px 0; transition:width 1s; }
  .shots-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .shot-stat { background:var(--surface2); border-radius:8px; padding:16px; text-align:center; }
  .shot-num { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; line-height:1; }
  .shot-num.green { color:var(--accent); } .shot-num.yellow { color:var(--accent3); } .shot-num.white { color:var(--text); } .shot-num.red { color:var(--accent2); }
  .shot-label { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:4px; }

  .events-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; }
  .event-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
  .event-item:last-child { border-bottom:none; }
  .event-min { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--muted); min-width:36px; }
  .event-icon { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .event-icon.goal { background:rgba(0,229,160,0.15); } .event-icon.ycard { background:rgba(245,197,24,0.15); } .event-icon.rcard { background:rgba(255,77,109,0.15); } .event-icon.sub { background:rgba(90,100,120,0.2); }
  .event-detail { flex:1; }
  .event-player { font-size:13px; font-weight:500; }
  .event-type { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:2px; }
  .event-team { font-family:'DM Mono',monospace; font-size:10px; color:var(--accent); }

  /* Standings */
  .league-header { padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; font-size:12px; font-weight:500; }
  .standings-table { width:100%; border-collapse:collapse; }
  .standings-table th { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; padding:8px 8px 8px 16px; text-align:left; border-bottom:1px solid var(--border); }
  .standings-table th:not(:first-child) { text-align:center; padding-left:0; }
  .standings-table td { padding:8px 8px 8px 16px; border-bottom:1px solid rgba(30,36,45,0.5); font-size:12px; }
  .standings-table td:not(:first-child) { text-align:center; font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); padding-left:0; }
  .standings-table tr:hover td { background:var(--surface); }
  .team-cell { display:flex; align-items:center; gap:6px; }
  .pos-num { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); min-width:14px; }
  .pos-num.cl { color:var(--accent); } .pos-num.el { color:var(--accent3); } .pos-num.rel { color:var(--accent2); }
  .team-logo-sm { width:14px; height:14px; object-fit:contain; }
  .pts-cell { color:var(--text) !important; font-weight:500 !important; }
  .form-dots { display:flex; gap:2px; justify-content:center; }
  .form-dot { width:5px; height:5px; border-radius:50%; }
  .form-dot.w { background:var(--accent); } .form-dot.d { background:var(--accent3); } .form-dot.l { background:var(--accent2); }

  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; gap:12px; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; }
  .spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .empty-state { padding:32px 20px; text-align:center; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; line-height:1.8; }
  .placeholder-panel { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; text-align:center; padding:40px; }
  .placeholder-icon { font-size:48px; opacity:0.3; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<header>
  <div class="logo"><span style="font-size:18px;color:var(--accent);font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:0;text-transform:lowercase;vertical-align:middle">xG</span><span>PROF</span></div>
  <nav>
    <button class="active" onclick="loadTab('live',this)">Live</button>
    <button onclick="loadTab('finished',this)">Finished</button>
    <button onclick="loadTab('upcoming',this)">Upcoming</button>
  </nav>
  <div class="status-badge" id="api-status">Connecting...</div>
</header>
<div class="layout">
  <!-- LEFT -->
  <div class="col">
    <div class="col-header">
      <span id="list-header"><span class="live-dot"></span>Live Matches</span>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="color:var(--accent);font-size:9px" id="match-count"></span>
        <div class="date-nav" id="date-nav" style="display:none">
          <button onclick="changeDate(-1)">◀</button>
          <span class="date-label" id="date-label"></span>
          <button onclick="changeDate(1)" id="date-next">▶</button>
        </div>
      </div>
    </div>
    <div id="match-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  </div>

  <!-- CENTER -->
  <div class="col" style="border-right:1px solid var(--border)">
    <div class="col-header"><span>Match Detail</span></div>
    <div class="center-panel" id="center-panel">
      <div class="placeholder-panel"><div class="placeholder-icon">⚽</div><div>Select a match</div></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="col">
    <div class="col-header"><span>Standings</span></div>
    <div id="standings-panel"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  </div>
</div>

<script>
let currentTab = 'live';
let currentDate = new Date();

// football-data.org proxy
async function fetchFD(path) {
  try {
    const res = await fetch(`/api/proxy?source=fd&endpoint=${encodeURIComponent(path)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(e) { console.error('FD Error:', e); return null; }
}

// API-Football proxy
async function fetchAF(path) {
  try {
    const res = await fetch(`/api/proxy?source=af&endpoint=${encodeURIComponent(path)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(e) { console.error('AF Error:', e); return null; }
}

const leagueColors = { PL:'#00e5a0', PD:'#f5c518', SA:'#ff4d6d', BL1:'#a78bfa', FL1:'#00b4d8', CL:'#f97316', CLI:'#f97316' };
const leagueFlags = {
  PL:  '<img src="https://flagcdn.com/16x12/gb-eng.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">',
  PD:  '<img src="https://flagcdn.com/16x12/es.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">',
  SA:  '<img src="https://flagcdn.com/16x12/it.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">',
  BL1: '<img src="https://flagcdn.com/16x12/de.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">',
  FL1: '<img src="https://flagcdn.com/16x12/fr.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">',
  PPL: '<img src="https://flagcdn.com/16x12/pt.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">',
  DED: '<img src="https://flagcdn.com/16x12/nl.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">',
  CL:  '<img src="https://flagcdn.com/16x12/eu.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">',
  EL:  '<img src="https://flagcdn.com/16x12/eu.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">',
  CLI: '🌎'
};

function formatDate(d) { return d.toISOString().split('T')[0]; }
function getDateLabel(d) {
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  if (formatDate(d) === formatDate(today)) return 'TODAY';
  if (formatDate(d) === formatDate(yesterday)) return 'YESTERDAY';
  if (formatDate(d) === formatDate(tomorrow)) return 'TOMORROW';
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}).toUpperCase();
}

function changeDate(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  const maxDate = new Date(); maxDate.setDate(maxDate.getDate()+1);
  if (currentDate > maxDate) currentDate = maxDate;
  updateDateNav();
  loadMatches(currentTab);
}

function updateDateNav() {
  const label = document.getElementById('date-label');
  const nextBtn = document.getElementById('date-next');
  if (label) label.textContent = getDateLabel(currentDate);
  if (nextBtn) {
    const maxDate = new Date(); maxDate.setDate(maxDate.getDate()+1);
    const disabled = formatDate(currentDate) >= formatDate(maxDate);
    nextBtn.style.opacity = disabled ? '0.3' : '1';
    nextBtn.style.pointerEvents = disabled ? 'none' : 'auto';
  }
}

async function loadTab(tab, btn) {
  currentTab = tab;
  currentDate = new Date();
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const h = document.getElementById('list-header');
  const dateNav = document.getElementById('date-nav');
  if (tab === 'live') {
    h.innerHTML = '<span class="live-dot"></span>Live Matches';
    if (dateNav) dateNav.style.display = 'none';
  } else {
    h.innerHTML = tab === 'finished' ? 'Finished' : 'Upcoming';
    if (dateNav) { dateNav.style.display = 'flex'; updateDateNav(); }
  }
  document.getElementById('match-list').innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
  document.getElementById('match-count').textContent = '';
  await loadMatches(tab);
}

async function loadMatches(tab) {
  const dateStr = formatDate(currentDate);
  let path = '';
  if (tab === 'live') path = '/matches?status=LIVE';
  else if (tab === 'finished') path = `/matches?date=${dateStr}&status=FINISHED,PAUSED`;
  else path = `/matches?date=${dateStr}&status=SCHEDULED,TIMED`;

  const data = await fetchFD(path);
  const listEl = document.getElementById('match-list');
  let matches = data?.matches || [];
  // Filter out stale PAUSED matches older than 3 hours
  const now3h = Date.now() - (3 * 60 * 60 * 1000);
  matches = matches.filter(m => {
    if (m.status === 'PAUSED') {
      const matchTime = new Date(m.lastUpdated || m.utcDate).getTime();
      return matchTime > now3h;
    }
    return true;
  });

  if (!matches.length) {
    listEl.innerHTML = `<div class="empty-state">No ${tab} matches<br>at the moment</div>`;
    document.getElementById('api-status').innerHTML = '<b style="color:var(--accent)">Connected</b>';
    document.getElementById('match-count').textContent = '0';
    return;
  }

  document.getElementById('api-status').innerHTML = 'football-data <b style="color:var(--accent)">Live</b>';
  document.getElementById('match-count').textContent = matches.length;

  listEl.innerHTML = matches.map((m, idx) => {
    const home = m.homeTeam?.shortName || m.homeTeam?.name || 'Home';
    const away = m.awayTeam?.shortName || m.awayTeam?.name || 'Away';
    const homeCrest = m.homeTeam?.crest || null;
    const awayCrest = m.awayTeam?.crest || null;
    const homeScore = m.score?.fullTime?.home ?? '—';
    const awayScore = m.score?.fullTime?.away ?? '—';
    const homeLeading = (m.score?.fullTime?.home ?? 0) > (m.score?.fullTime?.away ?? 0);
    const awayLeading = (m.score?.fullTime?.away ?? 0) > (m.score?.fullTime?.home ?? 0);
    const league = m.competition?.name || 'Football';
    const code = m.competition?.code || '';
    const color = leagueColors[code] || '#5a6478';
    const flag = leagueFlags[code] || '⚽';
    let timeStr = '';
    if (tab==='live') timeStr = m.minute ? `${m.minute}'` : 'Live';
    else if (tab==='finished') timeStr = 'FT';
    else { const d = new Date(m.utcDate); timeStr = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
    const timeClass = tab==='live' ? '' : (tab==='finished' ? 'finished' : 'upcoming');

    return `
      <div class="match-card" onclick="selectMatch(this,${m.id},'${code}')" style="animation-delay:${idx*0.04}s">
        <div class="match-league"><span class="league-dot" style="background:${color}"></span>${flag} ${league}</div>
        <div class="match-teams">
          <div class="team-row">
            <div class="team-name">${homeCrest?`<img class="team-crest" src="${homeCrest}" alt="">`:''} ${home}</div>
            <div class="score-wrap">
              <span class="xg-side" id="xgh-${m.id}"></span>
              <div class="score ${homeLeading?'leading':''}">${homeScore}</div>
            </div>
          </div>
          <div class="team-row">
            <div class="team-name">${awayCrest?`<img class="team-crest" src="${awayCrest}" alt="">`:''} ${away}</div>
            <div class="score-wrap">
              <span class="xg-side" id="xga-${m.id}"></span>
              <div class="score ${awayLeading?'leading':''}">${awayScore}</div>
            </div>
          </div>
        </div>
        <div class="match-meta"><span class="match-time ${timeClass}">${timeStr}</span></div>
      </div>`;
  }).join('');

  // Fetch xG for all matches from API-Football
  fetchXGForMatches(matches);
}

async function fetchXGForMatches(matches) {
  for (const m of matches) {
    const fdDate = m.utcDate?.split('T')[0];
    if (!fdDate) continue;
    // Use team names to find fixture in API-Football
    const homeName = encodeURIComponent(m.homeTeam?.name || '');
    const awayName = encodeURIComponent(m.awayTeam?.name || '');
    const data = await fetchAF(`/fixtures?date=${fdDate}&team=${m.homeTeam?.id || ''}`).catch(() => null);
    if (!data?.response?.length) continue;
    // Find matching fixture
    const fix = data.response.find(f => {
      const h = f.teams?.home?.name?.toLowerCase() || '';
      const a = f.teams?.away?.name?.toLowerCase() || '';
      const mh = (m.homeTeam?.name || '').toLowerCase();
      const ma = (m.awayTeam?.name || '').toLowerCase();
      return h.includes(mh.split(' ')[0]) || mh.includes(h.split(' ')[0]);
    });
    if (!fix) continue;
    const hXG = fix.statistics?.find(s => s.type === 'expected_goals')?.value;
    // Fetch stats for this fixture
    const stats = await fetchAF(`/fixtures/statistics?fixture=${fix.fixture?.id}`);
    const homeStats = stats?.response?.[0]?.statistics || [];
    const awayStats = stats?.response?.[1]?.statistics || [];
    const hxg = homeStats.find(s => s.type === 'expected_goals')?.value;
    const axg = awayStats.find(s => s.type === 'expected_goals')?.value;
    if (hxg != null && axg != null) {
      const hVal = parseFloat(hxg);
      const aVal = parseFloat(axg);
      if (hVal > 0 || aVal > 0) {
        const hEl = document.getElementById(`xgh-${m.id}`);
        const aEl = document.getElementById(`xga-${m.id}`);
        if (hEl) {
          hEl.textContent = hVal.toFixed(2);
          hEl.className = 'xg-side ' + (hVal >= aVal ? 'higher' : 'lower');
          hEl.style.display = 'inline';
        }
        if (aEl) {
          aEl.textContent = aVal.toFixed(2);
          aEl.className = 'xg-side ' + (aVal >= hVal ? 'higher' : 'lower');
          aEl.style.display = 'inline';
        }
      }
    }
  }
}

async function selectMatch(el, matchId, leagueCode) {
  document.querySelectorAll('.match-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedLeagueCode = leagueCode;
  const centerPanel = document.getElementById('center-panel');
  centerPanel.innerHTML = '<div class="loading"><div class="spinner"></div>Loading match details...</div>';

  const data = await fetchFD(`/matches/${matchId}`);
  const m = data;
  if (!m || !m.homeTeam) {
    centerPanel.innerHTML = '<div class="empty-state">Could not load match details</div>';
    return;
  }
  selectedMatchData = m;
  selectedMatchData.id = matchId;

  const home = m.homeTeam?.name || 'Home';
  const away = m.awayTeam?.name || 'Away';
  const homeCrest = m.homeTeam?.crest || null;
  const awayCrest = m.awayTeam?.crest || null;
  const homeScore = m.score?.fullTime?.home ?? 0;
  const awayScore = m.score?.fullTime?.away ?? 0;
  const league = m.competition?.name || 'Football';
  const timeStr = m.minute ? `${m.minute}'` : (m.status === 'FINISHED' ? 'FT' : m.status || '');

  // Events
  const goals = m.goals || [];
  const bookings = m.bookings || [];
  const subs = m.substitutions || [];
  const allEvents = [
    ...goals.map(g => ({ min: g.minute, type:'goal', player: g.scorer?.name||'', team: g.team?.name||'', detail: g.type||'Goal' })),
    ...bookings.map(b => ({ min: b.minute, type: b.card==='RED_CARD'?'rcard':'ycard', player: b.player?.name||'', team: b.team?.name||'' })),
    ...subs.map(s => ({ min: s.minute, type:'sub', player: `${s.playerOut?.name||''} → ${s.playerIn?.name||''}`, team: s.team?.name||'' }))
  ].sort((a,b) => (a.min||0)-(b.min||0));

  const eventsHTML = allEvents.length ? allEvents.slice(0,15).map(ev => {
    let icon='⚽', cls='goal';
    if (ev.type==='ycard') { icon='🟨'; cls='ycard'; }
    else if (ev.type==='rcard') { icon='🟥'; cls='rcard'; }
    else if (ev.type==='sub') { icon='🔄'; cls='sub'; }
    return `
      <div class="event-item">
        <div class="event-min">${ev.min||''}'</div>
        <div class="event-icon ${cls}">${icon}</div>
        <div class="event-detail">
          <div class="event-player">${ev.player}</div>
          <div class="event-type">${ev.detail||ev.type}</div>
        </div>
        <div class="event-team">${(ev.team||'').substring(0,3).toUpperCase()}</div>
      </div>`;
  }).join('') : '<div class="empty-state" style="padding:16px 0">No events yet</div>';

  centerPanel.innerHTML = `
    <div class="match-hero">
      <div class="hero-league">⚽ ${league}</div>
      <div class="hero-teams">
        <div class="hero-team">
          <div class="hero-crest">${homeCrest?`<img src="${homeCrest}" alt="">`:''}</div>
          <div class="hero-name">${home}</div>
        </div>
        <div class="hero-score-block">
          <div class="hero-score">${homeScore} · ${awayScore}</div>
          <div class="hero-status"><span class="live-dot"></span>${timeStr}</div>
          <div class="xg-hero" id="xg-hero-${matchId}"></div>
        </div>
        <div class="hero-team">
          <div class="hero-crest">${awayCrest?`<img src="${awayCrest}" alt="">`:''}</div>
          <div class="hero-name">${away}</div>
        </div>
      </div>
    </div>
    <div class="events-panel">
      <div class="section-title">Match Events</div>
      ${eventsHTML}
    </div>`;

  // Fetch xG and stats from API-Football
  fetchMatchXG(matchId, m, home, away);
}

async function fetchMatchXG(matchId, m, home, away) {
  const fdDate = m.utcDate?.split('T')[0];
  if (!fdDate) return;
  // Search by date and home team
  const data = await fetchAF(`/fixtures?date=${fdDate}`);
  if (!data?.response?.length) return;

  const mhLower = (m.homeTeam?.name||'').toLowerCase();
  const maLower = (m.awayTeam?.name||'').toLowerCase();

  const fix = data.response.find(f => {
    const fh = (f.teams?.home?.name||'').toLowerCase();
    const fa = (f.teams?.away?.name||'').toLowerCase();
    const hMatch = fh.includes(mhLower.split(' ')[0]) || mhLower.includes(fh.split(' ')[0]);
    const aMatch = fa.includes(maLower.split(' ')[0]) || maLower.includes(fa.split(' ')[0]);
    return hMatch && aMatch;
  });

  if (!fix) return;

  const stats = await fetchAF(`/fixtures/statistics?fixture=${fix.fixture?.id}`);
  const homeStats = stats?.response?.[0]?.statistics || [];
  const awayStats = stats?.response?.[1]?.statistics || [];

  const hxg = homeStats.find(s => s.type === 'expected_goals')?.value;
  const axg = awayStats.find(s => s.type === 'expected_goals')?.value;
  const homePoss = homeStats.find(s => s.type === 'Ball Possession')?.value || '50%';
  const awayPoss = awayStats.find(s => s.type === 'Ball Possession')?.value || '50%';
  const homePossNum = parseInt(homePoss) || 50;
  const homeShotsT = homeStats.find(s => s.type === 'Total Shots')?.value || '—';
  const awayShotsT = awayStats.find(s => s.type === 'Total Shots')?.value || '—';
  const homeShotsOn = homeStats.find(s => s.type === 'Shots on Goal')?.value || '—';
  const awayShotsOn = awayStats.find(s => s.type === 'Shots on Goal')?.value || '—';
  const homeCorners = homeStats.find(s => s.type === 'Corner Kicks')?.value || '—';
  const awayCorners = awayStats.find(s => s.type === 'Corner Kicks')?.value || '—';
  const homeYellow = homeStats.find(s => s.type === 'Yellow Cards')?.value || '—';
  const awayYellow = awayStats.find(s => s.type === 'Yellow Cards')?.value || '—';

  // Show xG in hero
  if (hxg != null && axg != null) {
    const heroEl = document.getElementById(`xg-hero-${matchId}`);
    if (heroEl) {
      heroEl.innerHTML = `
        <span class="xg-badge home">xG ${parseFloat(hxg).toFixed(2)}</span>
        <span style="color:var(--muted);font-family:'DM Mono',monospace;font-size:10px">vs</span>
        <span class="xg-badge away">${parseFloat(axg).toFixed(2)} xG</span>`;
    }
    // Also update match card
    const hEl = document.getElementById(`xgh-${matchId}`);
    const aEl = document.getElementById(`xga-${matchId}`);
    if (hEl) { hEl.textContent = parseFloat(hxg).toFixed(2); hEl.style.display = 'inline'; }
    if (aEl) { aEl.textContent = parseFloat(axg).toFixed(2); aEl.style.display = 'inline'; }
  }

  // Add stats panel after events
  const centerPanel = document.getElementById('center-panel');
  const statsHTML = `
    <div class="stats-panel" style="margin-top:24px">
      <div class="section-title">Match Statistics</div>
      <div class="xg-bar-wrap">
        <div class="xg-bar-label">
          <span style="color:var(--accent)">${home.split(' ')[0]}</span>
          <span>Possession</span>
          <span style="color:var(--accent2)">${away.split(' ')[0]}</span>
        </div>
        <div class="xg-bar-track">
          <div class="xg-bar-home" style="width:${homePossNum}%"></div>
          <div class="xg-bar-away" style="width:${100-homePossNum}%"></div>
        </div>
        <div class="xg-bar-label" style="margin-top:4px;margin-bottom:0">
          <span>${homePoss}</span><span></span><span>${awayPoss}</span>
        </div>
      </div>
      <div class="shots-grid">
        <div class="shot-stat">
          <div class="shot-num green">${homeShotsT} <span style="font-size:16px;color:var(--muted)">/ ${awayShotsT}</span></div>
          <div class="shot-label">Total Shots</div>
        </div>
        <div class="shot-stat">
          <div class="shot-num yellow">${homeShotsOn} <span style="font-size:16px;color:var(--muted)">/ ${awayShotsOn}</span></div>
          <div class="shot-label">On Target</div>
        </div>
        <div class="shot-stat">
          <div class="shot-num white">${homeCorners} <span style="font-size:16px;color:var(--muted)">/ ${awayCorners}</span></div>
          <div class="shot-label">Corners</div>
        </div>
        <div class="shot-stat">
          <div class="shot-num red">${homeYellow} <span style="font-size:16px;color:var(--muted)">/ ${awayYellow}</span></div>
          <div class="shot-label">Yellow Cards</div>
        </div>
      </div>
    </div>`;

  centerPanel.innerHTML += statsHTML;
}

async function loadStandings() {
  const leagues = [
    { id: 39, name: 'Premier League', flag: '<img src="https://flagcdn.com/16x12/gb-eng.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">' },
    { id: 140, name: 'La Liga', flag: '<img src="https://flagcdn.com/16x12/es.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">' },
    { id: 135, name: 'Serie A', flag: '<img src="https://flagcdn.com/16x12/it.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">' },
    { id: 78, name: 'Bundesliga', flag: '<img src="https://flagcdn.com/16x12/de.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">' },
    { id: 61, name: 'Ligue 1', flag: '<img src="https://flagcdn.com/16x12/fr.png" style="width:16px;height:12px;vertical-align:middle;border-radius:1px">' }
  ];
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const month = new Date().getMonth() + 1;
  const season = month >= 8 ? new Date().getFullYear() : new Date().getFullYear() - 1;
  const standingsEl = document.getElementById('standings-panel');
  standingsEl.innerHTML = '';

  for (const league of leagues) {
    await sleep(1500);
    const data = await fetchAF(`/standings?league=${league.id}&season=${season}`);
    const rows = data?.response?.[0]?.league?.standings?.[0] || [];
    if (!rows.length) continue;

    const tableRows = rows.slice(0, 6).map(team => {
      const pos = team.rank;
      let posClass = pos<=4?'cl':pos<=6?'el':pos>=18?'rel':'';
      const form = (team.form||'').slice(-5).split('').map(f =>
        `<div class="form-dot ${f==='W'?'w':f==='D'?'d':'l'}"></div>`
      ).join('');
      return `
        <tr>
          <td><div class="team-cell">
            <span class="pos-num ${posClass}">${pos}</span>
            ${team.team.logo?`<img class="team-logo-sm" src="${team.team.logo}" alt="">`:''}
            <span style="font-size:11px;font-weight:500">${(team.team.name||'').substring(0,11)}</span>
          </div></td>
          <td>${team.all.played}</td>
          <td>${team.goalsDiff>0?'+':''}${team.goalsDiff}</td>
          <td class="pts-cell">${team.points}</td>
          <td><div class="form-dots">${form}</div></td>
        </tr>`;
    }).join('');

    standingsEl.innerHTML += `
      <div>
        <div class="league-header">${league.flag} ${league.name}</div>
        <table class="standings-table">
          <thead><tr><th>#  Team</th><th>P</th><th>GD</th><th>Pts</th><th>Form</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      <div style="border-top:4px solid var(--border)"></div>`;
  }

  if (!standingsEl.innerHTML) {
    standingsEl.innerHTML = '<div class="empty-state">Could not load standings</div>';
    return;
  }
  standingsEl.innerHTML += `
    <div style="padding:12px 20px">
      <div style="display:flex;gap:16px;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">
        <span><span style="color:var(--accent)">●</span> CL</span>
        <span><span style="color:var(--accent3)">●</span> EL</span>
        <span><span style="color:var(--accent2)">●</span> REL</span>
      </div>
    </div>`;
}

let refreshInterval;
let xgRefreshInterval;
function startAutoRefresh() {
  clearInterval(refreshInterval);
  clearInterval(xgRefreshInterval);
  if (currentTab==='live') {
    refreshInterval = setInterval(()=>loadMatches('live'), 60000);
  }
}

loadMatches('live');
setTimeout(() => loadStandings(), 3000);
startAutoRefresh();

// Auto-refresh xG for selected match every 2 minutes
let selectedMatchData = null;
let selectedLeagueCode = null;
setInterval(() => {
  if (selectedMatchData && currentTab === 'live') {
    fetchMatchXG(selectedMatchData.id, selectedMatchData, 
      selectedMatchData.homeTeam?.name, selectedMatchData.awayTeam?.name);
  }
}, 120000);
